description: ESP32 performance monitor based on FreeRTOS run-time stats (CPU, tasks, heap/stack)
version: "0.1.0"
license: Apache-2.0
url: https://github.com/mkyx-001/components/tree/main/performeter
repository: https://github.com/mkyx-001/components.git
repository_info:
  path: performeter
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c2
  - esp32c3
  - esp32c6
# 单核 SoC（esp32c3/c6 等）core_util[1] 将恒为 0 且无 IDLE1。
dependencies:
  idf:
    version: ">=5.0"
